name: Publish Memora.Client Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore Memora.Client
        run: dotnet restore src/Memora.Client/Memora.Client.csproj

      - name: Build Memora.Client
        run: dotnet build src/Memora.Client/Memora.Client.csproj -c Release

      - name: Pack Memora.Client
        run: dotnet pack src/Memora.Client/Memora.Client.csproj -c Release --output ./nupkg

      - name: Publish to GitHub Packages
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem "./nupkg" -Filter "*.nupkg" | Select-Object -First 1 -ExpandProperty FullName
          if ($nupkg) {
              dotnet nuget push "$nupkg" `
                --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
                --api-key "${{ secrets.GH_KEY }}" `
                --skip-duplicate
          } else {
              Write-Output "No .nupkg found – skipping GitHub Packages"
          }

      - name: Publish to nuget.org
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem "./nupkg" -Filter "*.nupkg" | Select-Object -First 1 -ExpandProperty FullName
          if ($nupkg) {
              dotnet nuget push "$nupkg" `
                --source "https://api.nuget.org/v3/index.json" `
                --api-key "${{ secrets.NUGET_KEY }}" `
                --skip-duplicate
          } else {
              Write-Output "No .nupkg found – skipping nuget.org"
          }
